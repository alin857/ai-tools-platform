<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="AI 工具聚合平台 — AI绘画、AI视频生成、电商设计、内容创作，一站式 AI 创作工具">
<meta name="theme-color" content="#080c14">
<title>AI 工具聚合平台</title>

<!-- 全局样式 -->
<link rel="stylesheet" href="css/design-tokens.css">
<link rel="stylesheet" href="css/app.css">
<link rel="stylesheet" href="css/pages.css">
</head>
<body>

<!-- ===== 背景动效 ===== -->
<div class="bg-grid"></div>
<div class="bg-orb bg-orb--1"></div>
<div class="bg-orb bg-orb--2"></div>
<div class="bg-orb bg-orb--3"></div>

<!-- ===== 顶部导航栏 ===== -->
<header class="app-header">
  <div class="app-header__inner">
    <a href="#/" class="app-header__logo" style="color:inherit;text-decoration:none;">
      <span>AI</span> 工具聚合平台
    </a>
    <div class="app-header__actions">
      <button class="app-header__btn" id="btn-my-products">
        📦 我的产品
      </button>
    </div>
  </div>
</header>

<!-- ===== 页面容器 ===== -->
<main id="app">
  <div id="page-container" class="page active"></div>
</main>

<!-- ===== 底部导航栏（移动端） ===== -->
<nav class="bottom-nav">
  <ul class="bottom-nav__list">
    <li>
      <button class="bottom-nav__item active" data-hash="#/" data-section="home">
        <span class="nav-icon">🏠</span>
        <span>首页</span>
      </button>
    </li>
    <li>
      <button class="bottom-nav__item" data-hash="#/ai-studio" data-section="ai-studio,text-to-image,image-to-video">
        <span class="nav-icon">🎨</span>
        <span>创作</span>
      </button>
    </li>
    <li>
      <button class="bottom-nav__item" data-hash="#/one-click-create" data-section="one-click-create,article-rewrite,copy-extract,video-to-article,store-visit">
        <span class="nav-icon">✍️</span>
        <span>内容</span>
      </button>
    </li>
    <li>
      <button class="bottom-nav__item" data-hash="#/my-products" data-section="my-products">
        <span class="nav-icon">👤</span>
        <span>我的</span>
      </button>
    </li>
  </ul>
</nav>

<!-- ===== 工具库（必须在 App 之前加载） ===== -->
<script src="js/utils/ui.js"></script>
<script src="js/utils/storage.js"></script>
<script src="js/utils/mock-api.js"></script>
<script src="js/utils/api.js"></script>

<!-- ===== 核心框架 ===== -->
<script src="js/router.js"></script>
<script src="js/app.js"></script>

<!-- ===== 首页模块（首屏关键，直接引入） ===== -->
<script src="js/modules/home.js"></script>

</body>
</html>
