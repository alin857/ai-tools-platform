<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="AI 工具聚合平台 — AI绘画、AI视频生成、电商设计、内容创作，一站式 AI 创作工具">
<meta name="theme-color" content="#080c14">
<title>AI 工具聚合平台</title>

<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        accent: { DEFAULT: '#4da6ff', dim: 'rgba(77,166,255,0.1)', strong: 'rgba(77,166,255,0.3)' },
        base: { DEFAULT: '#0f0f11', card: '#1a1a1e', input: 'rgba(255,255,255,0.03)' },
        border: { DEFAULT: 'rgba(255,255,255,0.06)', hover: 'rgba(255,255,255,0.12)' },
        txt: { primary: '#f0f0f0', body: '#ccc', secondary: '#999', muted: '#666' }
      },
      fontFamily: { sans: ['-apple-system','BlinkMacSystemFont','"PingFang SC"','"Microsoft YaHei"','sans-serif'] }
    }
  }
}
</script>

<!-- 全局样式（覆盖 Tailwind 无法处理的部分） -->
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #080c14;
    color: #c8d6e5;
    line-height: 1.7;
    overflow-x: hidden;
    min-height: 100vh;
  }
  ::selection { background: rgba(0, 212, 255, 0.3); color: #fff; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
  a { color: #00d4ff; text-decoration: none; }
  img { max-width: 100%; display: block; }
  button { cursor: pointer; border: none; outline: none; font-family: inherit; }
  input, textarea, select { font-family: inherit; outline: none; border: none; background: none; color: inherit; }

  /* 关键动画 */
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 毛玻璃导航栏 */
  .header-blur { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); background: rgba(15,15,17,0.92); }
  .nav-blur { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); background: rgba(15,15,17,0.94); }

  /* iOS 安全区域 */
  @supports (padding-bottom: env(safe-area-inset-bottom)) { .pb-safe { padding-bottom: env(safe-area-inset-bottom); } }

  /* 减少动画 */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>

<!-- 全局布局 + 模块通用样式 -->
<link rel="stylesheet" href="css/app.css">
<link rel="stylesheet" href="css/pages.css">
</head>
<body class="text-txt-body">

<!-- 顶部导航栏 -->
<header class="fixed top-0 left-0 right-0 z-[100] header-blur border-b border-border h-[60px]">
  <div class="max-w-[1100px] mx-auto px-8 h-full flex items-center justify-between">
    <a href="#/" class="text-xl font-bold text-white no-underline hover:text-white">
      <span class="text-accent">AI</span> 工具聚合平台
    </a>
    <div style="display:flex;gap:8px;align-items:center;" id="headerRight">
      <!-- JS 动态渲染 -->
    </div>
  </div>
</header>

<!-- 页面容器 -->
<main id="app" class="relative z-[1] max-w-[1100px] mx-auto px-8 pt-[76px] pb-24 min-h-screen">
  <div id="page-container" class="animate-in"></div>
</main>

<!-- 底部导航栏（移动端） -->
<nav class="bottom-nav hidden max-md:block fixed bottom-0 left-0 right-0 z-[100] h-14 nav-blur border-t border-border pb-safe">
  <ul class="flex justify-around items-center h-full list-none">
    <li><button class="bottom-nav__item active flex flex-col items-center gap-0.5 px-3 py-1 text-[11px] font-medium text-txt-muted bg-transparent border-none cursor-pointer" data-hash="#/" data-section="home"><span class="text-[22px] leading-none">🏠</span><span>首页</span></button></li>
    <li><button class="bottom-nav__item flex flex-col items-center gap-0.5 px-3 py-1 text-[11px] font-medium text-txt-muted bg-transparent border-none cursor-pointer" data-hash="#/ai-studio" data-section="ai-studio,text-to-image,image-to-video"><span class="text-[22px] leading-none">🎨</span><span>创作</span></button></li>
    <li><button class="bottom-nav__item flex flex-col items-center gap-0.5 px-3 py-1 text-[11px] font-medium text-txt-muted bg-transparent border-none cursor-pointer" data-hash="#/one-click-create" data-section="one-click-create,article-rewrite,copy-extract,video-to-article,store-visit"><span class="text-[22px] leading-none">✍️</span><span>内容</span></button></li>
  </ul>
</nav>

<!-- 工具库 -->
<script src="js/utils/ui.js"></script>
<script src="js/utils/storage.js"></script>
<script src="js/utils/mock-api.js"></script>
<script src="js/utils/api.js"></script>
<script src="js/utils/auth.js"></script>

<!-- 核心框架 -->
<script src="js/router.js"></script>
<script src="js/app.js"></script>

<!-- 首页模块 -->
<script src="js/modules/home.js"></script>

</body>
</html>
